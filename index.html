function showPrayer() {
  const topic = document.getElementById("prayerTopic").value;
  const display = document.getElementById("displayBox");
  if (!topic || !prayers[topic]) {
    display.innerText = "Please select a topic.";
    return;
  }
  const list = prayers[topic];
  const randomIndex = Math.floor(Math.random() * list.length);
  display.innerText = list[randomIndex];
}

function showQuote() {
  const randomIndex = Math.floor(Math.random() * quotes.length);
  document.getElementById("quoteBox").innerText = quotes[randomIndex];
